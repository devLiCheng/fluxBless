version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fluxbless_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fluxbless
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: fluxbless_redis
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fluxbless_backend
    restart: always
    environment:
      DATABASE_URL: "mysql://root:root@mysql:3306/fluxbless"
      PORT: 4000
      NODE_ENV: production
      JWT_SECRET: fluxbless-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost}"
      ADMIN_URL: "${ADMIN_URL:-http://localhost/admin}"
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      SENTRY_DSN: "https://03a9c9407fc458366e79da05982b92aa@o4511607466295296.ingest.us.sentry.io/4511607479599104"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mysql
      - redis
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost/api}"
        NEXT_PUBLIC_SENTRY_DSN: "https://03a9c9407fc458366e79da05982b92aa@o4511607466295296.ingest.us.sentry.io/4511607479599104"
    container_name: fluxbless_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost/api}"
      NEXT_PUBLIC_SENTRY_DSN: "https://03a9c9407fc458366e79da05982b92aa@o4511607466295296.ingest.us.sentry.io/4511607479599104"
    depends_on:
      - backend
    expose:
      - "3000"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost/api}"
    container_name: fluxbless_admin
    restart: always
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: fluxbless_nginx
    restart: always
    ports:
      - "8095:80"
    depends_on:
      - frontend
      - admin
      - backend

volumes:
  mysql_data:
  uploads_data:
