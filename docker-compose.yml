version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fluxbless_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fluxbless
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: fluxbless_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fluxbless_backend
    restart: always
    environment:
      DATABASE_URL: "mysql://root:root@mysql:3306/fluxbless"
      PORT: 4000
      NODE_ENV: production
      JWT_SECRET: fluxbless-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: "http://localhost"
      ADMIN_URL: "http://localhost/admin"
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    depends_on:
      - mysql
      - redis
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fluxbless_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost/api"
    depends_on:
      - backend
    expose:
      - "3000"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: fluxbless_admin
    restart: always
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: fluxbless_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - admin
      - backend

volumes:
  mysql_data:
